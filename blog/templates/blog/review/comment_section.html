{% block content %}
                    <section class="mb-5">
                        <div class="card bg-light">
                            <div class="card-body">
                                <!-- Comment form-->
                                <form class="mb-4" method="post" action="">
                                    {% csrf_token %}
                                    <input name="body" class="form-control" rows="3" placeholder="Přidej se do diskuse a napiš komentář!"/>
                                </form>



                                {% for comment in comments %}
                                <!-- Single comment-->
                                <div class="d-flex pb-4">
                                    <div class="flex-shrink-0"><img class="rounded-circle" src="https://dummyimage.com/50x50/ced4da/6c757d.jpg" alt="..." /></div>
                                    <div class="ms-3">
                                        <div class="fw-bold">{{comment.user.username}} <small class="text-muted">| přidáno před {{comment.created|timesince}}</small></div>
                                        {{comment.body}}
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </section>
{% endblock content %}
